name: Create Labels
on: [push]
jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: '🎨 design', color: '2ecc71', description: 'Design e elementos visuais' },
              { name: '💻 frontend', color: '3498db', description: 'HTML, CSS, JavaScript' },
              { name: '🎬 animações', color: '9b59b6', description: 'Efeitos 3D e animações' },
              { name: '🎵 música', color: 'e67e22', description: 'Áudio e música' },
              { name: '📍 mapa', color: 'e74c3c', description: 'Integração Google Maps' },
              { name: '🔧 backend', color: '95a5a6', description: 'API e banco de dados' },
              { name: '📋 task', color: 'f1c40f', description: 'Tarefas gerais' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`✓ Label "${label.name}" criada`);
              } catch (error) {
                if (error.status === 422) {
                  console.log(`⚠ Label "${label.name}" já existe`);
                } else {
                  console.error(`✗ Erro ao criar label "${label.name}":`, error);
                }
              }
            }
